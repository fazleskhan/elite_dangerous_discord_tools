services:
  elite-dangerous-discord-tools:
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: https://github.com/fazleskhan/elite_dangerous_discord_tools.git#main
      dockerfile: Dockerfile
    image: fazleskhan/public-images:elite-dangerous-discord-tools
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN}
    volumes:
      # Externalize application logging behavior and output.
      - ./config/loguru.json:/app/config/loguru.json:ro
      - ./logs:/app/logs
      # Persist application data across container redeploys.
      - ./data:/app/data
